# Installed to /etc/xdg-desktop-portal/portals.conf — admin-level config that
# takes precedence over the xdg-desktop-portal package's own
# /usr/share/xdg-desktop-portal/portals.conf (which we must not overwrite).
# Makes Exrawk the system-wide Open/Save dialog; everything else keeps the
# distro default backend.
[preferred]
default=*
org.freedesktop.impl.portal.FileChooser=exrawk
